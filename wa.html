<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Radar</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #player { width: 100vw; height: 100vw; border-radius: 50%; object-fit: cover; display: none; z-index: 2; }
        .radar-line { position: absolute; width: 90vw; height: 90vw; border: 1px solid #0f0; border-radius: 50%; opacity: 0.3; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.9); } 100% { transform: scale(1.1); opacity: 0; } }
    </style>
</head>
<body>
    <div class="radar-line"></div>
    <video id="player" playsinline autoplay muted></video>
    <script>
        // El video se cargará automáticamente cuando el celular mande la señal
        const urlParams = new URLSearchParams(window.location.search);
        const vid = urlParams.get('video');
        if (vid) {
            const p = document.getElementById('player');
            p.src = vid; p.style.display = 'block';
            p.play();
        }
    </script>
</body>
</html>
