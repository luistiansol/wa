<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walmart List - Luis</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 15px; }
        h2 { color: #00ff00; font-size: 18px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .category { font-weight: bold; color: #0088ff; margin-top: 15px; display: block; font-size: 14px; }
        .item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; }
        input[type="checkbox"] { width: 22px; height: 22px; margin-right: 12px; accent-color: #00ff00; }
        label { font-size: 14px; }
        .checked { text-decoration: line-through; opacity: 0.5; }
        button { margin-top: 20px; padding: 10px; background: #444; color: #fff; border: none; border-radius: 5px; width: 100%; }
    </style>
</head>
<body>
    <h2>🛒 Store Checklist</h2>
    
    <span class="category">PHARMACY</span>
    <div class="item"><input type="checkbox" id="i1"><label for="i1">Zinc Gluconate (50mg)</label></div>
    <div class="item"><input type="checkbox" id="i2"><label for="i2">L-Arginine / L-Carnitine</label></div>

    <span class="category">GROCERY / PRODUCE</span>
    <div class="item"><input type="checkbox" id="i3"><label for="i3">Whole Eggs (Yolks = Vit D)</label></div>
    <div class="item"><input type="checkbox" id="i4"><label for="i4">Avocados (Healthy Fats)</label></div>
    <div class="item"><input type="checkbox" id="i5"><label for="i5">Pumpkin Seeds (Pepitas)</label></div>
    <div class="item"><input type="checkbox" id="i6"><label for="i6">Lean Beef (93% Lean)</label></div>
    <div class="item"><input type="checkbox" id="i7"><label for="i7">Broccoli (Flush Estrogen)</label></div>
    <div class="item"><input type="checkbox" id="i8"><label for="i8">Pomegranate Juice</label></div>
    <div class="item"><input type="checkbox" id="i9"><label for="i9">Dark Chocolate (85%+)</label></div>

    <span class="category">BEVERAGES</span>
    <div class="item"><input type="checkbox" id="i10"><label for="i10">Propel Zero Sugar</label></div>
    <div class="item"><input type="checkbox" id="i11"><label for="i11">V8 Juice (Original/Low Sodium)</label></div>

    <button onclick="localStorage.clear(); location.reload();">RESET LIST</button>

    <script>
        document.querySelectorAll('input').forEach(cb => {
            const id = cb.id;
            cb.checked = localStorage.getItem(id) === 'true';
            cb.onchange = () => {
                localStorage.setItem(id, cb.checked);
                cb.nextElementSibling.classList.toggle('checked', cb.checked);
            };
            if(cb.checked) cb.nextElementSibling.classList.add('checked');
        });
    </script>
</body>
</html>
